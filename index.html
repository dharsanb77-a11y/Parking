<!DOCTYPE html>
<html><head>
        <title>Parking Management System</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/jpg" href="Logo.jpg">
    </head>
    <body>
            <img src="Vehicle.jpeg 20px"><h4>Enter Vehicle Details</h4>
        <form action="thankyou.html">
            <label>Name:</label>
            <input type="text" placeholder="Enter Your Name" required><br><br>
            <label>Phone Number:</label>
             <input type="tel" pattern="[0-9]{10}" placeholder="+91 1234567890" required>   <br><br>
            <label>Vehicle Number:</label>
            <input type="text" required placeholder="TN 00 AB 0000"><br><br>
                <input type="radio" name="vehicle" value="Bike">
                <label>Bike Rs.30 </label><br><Br>
                <input type="radio" name="vehicle" value="Car">
                <label>Car Rs.50 </label><br><br>
            <input type="submit" value="Login">
            <input type="reset" value="Reset">
        </form>
    
</body></html>
